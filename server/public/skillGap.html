<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuroVision — Skill Gap Analysis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-deep:       #0a0010;
      --bg-mid:        #0f0020;
      --purple-900:    #1a0035;
      --purple-700:    #3d007a;
      --purple-500:    #7c3aed;
      --purple-400:    #a855f7;
      --purple-300:    #c084fc;
      --purple-200:    #e9d5ff;
      --purple-100:    #f5f0ff;
      --accent:        #d946ef;
      --accent-glow:   rgba(217, 70, 239, 0.35);
      --glass-bg:      rgba(255, 255, 255, 0.045);
      --glass-border:  rgba(168, 85, 247, 0.25);
      --glass-strong:  rgba(255, 255, 255, 0.07);
      --text-primary:  #f5f0ff;
      --text-secondary: rgba(196, 181, 253, 0.75);
      --text-muted:    rgba(139, 92, 246, 0.55);
      --radius:        16px;
      --radius-sm:     10px;
      --shadow:        0 8px 32px rgba(0,0,0,0.5);
      --font-display:  'Cinzel', serif;
      --font-body:     'DM Sans', sans-serif;
      --success:       #10b981;
      --warning:       #f59e0b;
      --error:         #ef4444;
    }

    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    html { 
      scroll-behavior: smooth; 
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    .orb1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(124,58,237,0.18), transparent 70%);
      top: -100px; left: -100px;
      animation: drift1 14s ease-in-out infinite alternate;
    }
    .orb2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(217,70,239,0.12), transparent 70%);
      top: 30%; right: -80px;
      animation: drift2 18s ease-in-out infinite alternate;
    }
    .orb3 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(139,92,246,0.14), transparent 70%);
      bottom: 10%; left: 25%;
      animation: drift1 22s ease-in-out infinite alternate-reverse;
    }

    @keyframes drift1 { 
      from { transform: translate(0,0); } 
      to { transform: translate(30px, 40px); } 
    }
    @keyframes drift2 { 
      from { transform: translate(0,0); } 
      to { transform: translate(-25px, 30px); } 
    }

    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 68px;
      background: rgba(10, 0, 16, 0.75);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-symbol {
      color: var(--accent);
      font-size: 20px;
      animation: pulse-glow 3s ease-in-out infinite;
    }
    .logo-text {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 2px;
      background: linear-gradient(135deg, var(--purple-200), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    @keyframes pulse-glow {
      0%, 100% { text-shadow: 0 0 8px var(--accent-glow); }
      50% { text-shadow: 0 0 20px var(--accent-glow); }
    }

    .page-wrapper {
      position: relative;
      z-index: 1;
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 32px 80px;
    }

    .glass-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.05);
      padding: 36px 40px 32px;
    }

    h1, h2 {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 1.5px;
      background: linear-gradient(135deg, var(--purple-200), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 24px;
    }

    h3 {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--purple-300);
      margin-bottom: 16px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px 24px;
      margin-bottom: 24px;
    }

    .form-grid.full {
      grid-template-columns: 1fr;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--purple-300);
    }

    input, select {
      font-family: var(--font-body);
      font-size: 14px;
      padding: 11px 14px;
      background: rgba(15, 0, 32, 0.6);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      appearance: none;
      -webkit-appearance: none;
    }

    input::placeholder { 
      color: var(--text-muted); 
    }

    input:focus, select:focus {
      border-color: var(--purple-400);
      box-shadow: 0 0 0 3px rgba(168,85,247,0.15);
    }

    .select-wrapper {
      position: relative;
    }

    .select-wrapper select {
      padding-right: 36px;
      cursor: pointer;
    }

    .select-arrow {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--purple-400);
      pointer-events: none;
      font-size: 16px;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    button {
      flex: 1;
      padding: 12px 20px;
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      background: var(--purple-500);
      color: white;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:hover {
      background: var(--purple-400);
      border-color: var(--purple-300);
      box-shadow: 0 0 20px rgba(168,85,247,0.4);
    }

    button:active {
      transform: scale(0.98);
    }

    .progress-container {
      margin: 24px 0;
      padding: 20px;
      background: rgba(255,255,255,0.03);
      border-radius: var(--radius-sm);
      border: 1px solid var(--glass-border);
    }

    .progress-bar-bg {
      background: rgba(124,58,237,0.15);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      height: 16px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--success), var(--accent));
      transition: width 0.6s ease;
    }

    .progress-text {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .skills-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 24px;
    }

    .skills-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 20px;
    }

    .skills-box h3 {
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .skills-box ul {
      list-style: none;
      padding: 0;
    }

    .skills-box li {
      padding: 8px 0;
      border-bottom: 1px solid rgba(168,85,247,0.1);
      font-size: 14px;
      color: var(--text-secondary);
    }

    .skills-box li:last-child {
      border-bottom: none;
    }

    .skill-matched {
      color: var(--success);
      font-weight: 500;
    }

    .skill-missing {
      color: var(--error);
      font-weight: 500;
    }

    .tutorial-section {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(168,85,247,0.2);
    }

    .tutorial-section h4 {
      color: var(--warning);
      font-size: 12px;
      margin-bottom: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .tutorial-section ul {
      list-style: none;
      padding: 0;
    }

    .tutorial-section li {
      margin-bottom: 8px;
      padding: 0;
      border: none;
    }

    .tutorial-section li a {
      color: var(--purple-300);
      text-decoration: none;
      font-size: 13px;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .tutorial-section li a:hover {
      color: var(--accent);
      text-decoration: underline;
    }

    .info-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 16px;
      margin-bottom: 20px;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .profile-analyze-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 16px;
      margin-bottom: 20px;
    }

    .profile-analyze-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      color: var(--purple-300);
      margin-bottom: 10px;
    }

    .section-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      gap: 12px;
    }

    .section-title {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--purple-200);
      text-transform: uppercase;
    }

    .count-badge {
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid var(--glass-border);
      color: var(--purple-300);
      font-weight: 600;
      font-size: 13px;
      background: rgba(124,58,237,0.14);
      white-space: nowrap;
    }

    .profile-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    .roleCard {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .roleCard.active {
      border-color: var(--purple-400);
      box-shadow: 0 0 20px rgba(168,85,247,0.25);
    }

    .card-role-name {
      font-size: 22px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 10px;
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .meta-pill {
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid var(--glass-border);
      background: rgba(124,58,237,0.18);
      color: var(--purple-200);
    }

    .card-skills-label {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 6px;
      font-weight: 600;
    }

    .card-skills-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .card-skill-tag {
      font-size: 12px;
      padding: 5px 8px;
      border-radius: 999px;
      border: 1px solid var(--glass-border);
      background: rgba(168,85,247,0.12);
      color: var(--purple-200);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .tag-level {
      font-weight: 700;
      color: var(--accent);
    }

    .cardBtns {
      display: flex;
      gap: 8px;
    }

    .card-btn {
      padding: 10px 14px;
      font-size: 13px;
    }

    .btn-score {
      background: linear-gradient(90deg, var(--purple-500), var(--accent));
      border: none;
      width: 100%;
    }

    .profile-analyze-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      align-items: center;
    }

    .profile-note {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    .recommendation {
      background: rgba(217,70,239,0.1);
      border-left: 3px solid var(--accent);
      padding: 16px;
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      margin-bottom: 24px;
    }

    #result {
      display: none;
      animation: fade-in 0.6s ease forwards;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media(max-width: 768px) {
      .navbar {
        padding: 0 20px;
      }

      .page-wrapper {
        padding: 20px 16px 60px;
      }

      .form-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .skills-grid {
        grid-template-columns: 1fr;
      }

      h1, h2 {
        font-size: 22px;
      }

      .button-group {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="bg-orb orb3"></div>

  <nav class="navbar">
    <div class="logo">
      <span class="logo-symbol">✦</span>
      <span class="logo-text">NeuroVision</span>
    </div>
  </nav>

  <div class="page-wrapper">
    <h1>Skill Gap Analysis</h1>

    <div class="glass-card">
      <div class="profile-analyze-box" id="savedProfileBox" style="display:none;">
        <div class="section-row">
          <span class="section-title">Saved Role Profiles</span>
          <span class="count-badge" id="profile-count">0 profiles</span>
        </div>
        <div class="profile-grid" id="profile-grid"></div>
        <div class="profile-note" id="savedProfileNote"></div>
      </div>

      <div class="info-box" id="profileOnlyMessage">
        Analysis runs directly from your saved role profile data.
      </div>

      <div class="button-group">
        <button onclick="resetForm()">↺ Reset View</button>
      </div>
    </div>

    <div class="glass-card" id="result">
      <h2 id="roleTitle"></h2>

      <div class="info-box">
        <p id="cgpaInfo"></p>
      </div>

      <div class="recommendation">
        <p id="recommendation"></p>
      </div>

      <div class="progress-container">
        <div class="progress-bar-bg">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="progress-text">
          <span>Skill Match</span>
          <span id="scoreText"></span>
        </div>
      </div>

      <div class="skills-grid">
        <div class="skills-box">
          <h3>✅ Skills Matched</h3>
          <ul id="matched"></ul>
        </div>

        <div class="skills-box">
          <h3>⚠️ Missing Skills</h3>
          <ul id="missing"></ul>
          <div id="tutorialLinks" class="tutorial-section">
            <h4>📚 Learn Resources</h4>
            <ul id="tutorialList"></ul>
          </div>
        </div>
      </div>

      <div class="button-group" style="margin-top: 32px;">
        <button onclick="downloadResults()">📥 Download Report</button>
        <button onclick="shareResults()" style="background: var(--accent);">📤 Share Results</button>
      </div>
    </div>
  </div>

<script>
const currentUser = JSON.parse(sessionStorage.getItem("nv_user") || "null");
const userId = currentUser?.id || null;
let savedProfileRoles = [];
const queryParams = new URLSearchParams(window.location.search);
const queryRole = queryParams.get("role") || "";

document.addEventListener("DOMContentLoaded", () => {
  initializeSavedProfileAnalyzer();
});

async function initializeSavedProfileAnalyzer() {
  const note = document.getElementById("savedProfileNote");
  const box = document.getElementById("savedProfileBox");
  const profileOnlyMessage = document.getElementById("profileOnlyMessage");
  const countBadge = document.getElementById("profile-count");

  if (!userId) {
    box.style.display = "block";
    countBadge.textContent = "0 profiles";
    note.textContent = "Login required. Please login and save a role profile first.";
    profileOnlyMessage.innerText = "This page works only with saved profiles from profile.json.";
    return;
  }

  try {
    const response = await fetch(`/api/profile/${userId}`);
    if (!response.ok) {
      box.style.display = "block";
      note.textContent = "Could not fetch saved profiles. Please try again.";
      return;
    }

    const data = await response.json();
    savedProfileRoles = Array.isArray(data.roles) ? data.roles : [];
    countBadge.textContent = `${savedProfileRoles.length} profile${savedProfileRoles.length !== 1 ? "s" : ""}`;

    if (!savedProfileRoles.length) {
      box.style.display = "block";
      note.textContent = "No saved role profiles found. Please create one from Skills page.";
      profileOnlyMessage.innerText = "No manual input is required here. Save role data first, then come back.";
      return;
    }

    renderSavedProfileCards();

    box.style.display = "block";
    note.textContent = `Logged in as ${currentUser?.name || currentUser?.username || "User"}.`;

    // Direct flow from URL: analyze selected role if present.
    if (queryRole && savedProfileRoles.some((profile) => profile.role === queryRole)) {
      const queryIndex = savedProfileRoles.findIndex((profile) => profile.role === queryRole);
      await analyzeSavedProfile(queryRole, queryIndex);
    }
  } catch (error) {
    console.error("Unable to load saved profiles:", error);
    box.style.display = "block";
    note.textContent = "Unable to load saved profiles right now.";
  }
}

function renderSavedProfileCards() {
  const grid = document.getElementById("profile-grid");

  grid.innerHTML = "";
  savedProfileRoles.forEach((profile, index) => {
    const skillList = Array.isArray(profile.technicalSkills) ? profile.technicalSkills : [];

    const card = document.createElement("div");
    card.className = "roleCard";
    card.id = `profile-${index}`;
    card.innerHTML = `
      <div class="card-role-name">${profile.role}</div>
      <div class="card-meta">
        <span class="meta-pill">CGPA ${profile.cgpa}</span>
        <span class="meta-pill">INTERNSHIP ${profile.internshipMonths}mo</span>
        <span class="meta-pill">SKILLS ${skillList.length}</span>
      </div>
      <div class="card-skills-label">Technical Skills</div>
      <div class="card-skills-list">
        ${skillList.map((skill) => `
          <span class="card-skill-tag">${skill.skill}<span class="tag-level">${skill.level}</span></span>
        `).join("")}
      </div>
      <div class="cardBtns">
        <button class="card-btn btn-score" onclick="analyzeSavedProfile('${profile.role.replace(/'/g, "\\'")}', ${index})">Analyze Skill Gap</button>
      </div>
    `;

    grid.appendChild(card);
  });
}

function resetForm() {
  document.querySelectorAll(".roleCard").forEach((card) => card.classList.remove("active"));
  document.getElementById("result").style.display = "none";
  console.log('✅ View reset');
}

function buildResultFromScoreApi(data) {
  const compatibilityScore = Math.round(Number(data.finalScore || 0));
  const cgpa = Number(data?.profile?.cgpa || 0);
  const missingSkills = Array.isArray(data.missingSkills) ? data.missingSkills : [];
  const matchedSkills = Array.isArray(data.matchedSkills) ? data.matchedSkills : [];

  let cgpaStatus = "Average Academic Performance";
  if (cgpa >= 9) cgpaStatus = "Excellent Academic Performance";
  else if (cgpa >= 8.5) cgpaStatus = "Very Good Academic Performance";
  else if (cgpa >= 8) cgpaStatus = "Good Academic Performance";
  else if (cgpa < 6) cgpaStatus = "Low Academic Performance";

  const recommendation = compatibilityScore >= 80
    ? `Great fit for ${data.role}. Focus on polishing: ${missingSkills.slice(0, 2).join(", ") || "advanced implementation"}.`
    : compatibilityScore >= 60
      ? `Good progress for ${data.role}. Improve these skills: ${missingSkills.slice(0, 3).join(", ") || "practice projects"}.`
      : `You need stronger alignment for ${data.role}. Start with: ${missingSkills.slice(0, 4).join(", ") || "core role requirements"}.`;

  return {
    targetRole: data.role,
    cgpa,
    cgpaStatus,
    compatibilityScore,
    matchedSkills,
    missingSkills,
    missingSkillsWithTutorials: missingSkills.map((skill) => ({
      skill,
      tutorial: `https://www.geeksforgeeks.org/search/?q=${encodeURIComponent(skill)}`,
    })),
    recommendation,
  };
}

function renderResults(data) {
  document.getElementById("result").style.display = "block";
  document.getElementById("roleTitle").innerText = data.targetRole;
  document.getElementById("scoreText").innerText = data.compatibilityScore + "%";
  document.getElementById("progressBar").style.width = data.compatibilityScore + "%";
  document.getElementById("cgpaInfo").innerText = `CGPA: ${data.cgpa} - ${data.cgpaStatus}`;
  document.getElementById("recommendation").innerText = `Tip: ${data.recommendation}`;

  const matched = document.getElementById("matched");
  const missing = document.getElementById("missing");
  const tutorialList = document.getElementById("tutorialList");

  matched.innerHTML = "";
  missing.innerHTML = "";
  tutorialList.innerHTML = "";

  data.matchedSkills.forEach(skill => {
    matched.innerHTML += `<li class="skill-matched">✓ ${skill}</li>`;
  });

  data.missingSkills.forEach(skill => {
    missing.innerHTML += `<li class="skill-missing">✗ ${skill}</li>`;
  });

  if (data.missingSkillsWithTutorials && data.missingSkillsWithTutorials.length > 0) {
    data.missingSkillsWithTutorials.forEach(item => {
      tutorialList.innerHTML += `<li><a href="${item.tutorial}" target="_blank" rel="noopener">Learn ${item.skill}</a></li>`;
    });
  }

  window.currentResults = data;
}

async function analyzeSavedProfile(selectedRole, cardIndex = -1) {
  if (!userId) {
    alert("Please login first.");
    return;
  }

  const role = selectedRole;
  if (!role) {
    alert("Please select a saved role profile.");
    return;
  }

  document.querySelectorAll(".roleCard").forEach((card) => card.classList.remove("active"));
  if (cardIndex >= 0) {
    const activeCard = document.getElementById(`profile-${cardIndex}`);
    if (activeCard) activeCard.classList.add("active");
  }

  const note = document.getElementById("savedProfileNote");
  note.textContent = `Analyzing saved profile for ${role}...`;

  try {
    const response = await fetch(`/api/score/${userId}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ role }),
    });

    if (!response.ok) {
      throw new Error(`Unable to analyze saved profile (${response.status})`);
    }

    const data = await response.json();
    const transformed = buildResultFromScoreApi(data);
    renderResults(transformed);
    note.textContent = `Showing analysis for ${role}.`;
  } catch (error) {
    console.error("Saved profile analysis failed:", error);
    alert("Could not analyze saved profile. Please try again.");
  }
}

function shareResults() {
  if (!window.currentResults) {
    alert('Please analyze your skills first!');
    return;
  }

  const data = window.currentResults;
  const shareText = `🎯 I analyzed my skills for ${data.targetRole}!\n\n📈 Skill Match: ${data.compatibilityScore}%\n🎓 CGPA: ${data.cgpa}/10\n\n💡 "${data.recommendation.substring(0, 100)}..."\n\n✨ Powered by NeuroVision - Career Intelligence Platform`;
  
  if (navigator.share) {
    navigator.share({
      title: 'NeuroVision Skill Gap Analysis',
      text: shareText,
      url: window.location.href
    }).catch(err => console.log('Error sharing:', err));
  } else {
    // Fallback: Copy to clipboard
    navigator.clipboard.writeText(shareText).then(() => {
      alert('✅ Results copied to clipboard!');
    }).catch(err => {
      console.error('Failed to copy:', err);
      alert('Share text: ' + shareText);
    });
  }
}
