<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuroVision – Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-deep: #0a0010;
      --bg-mid: #0f0020;
      --purple-900: #1a0035;
      --purple-700: #3d007a;
      --purple-500: #7c3aed;
      --purple-400: #a855f7;
      --purple-300: #c084fc;
      --purple-200: #e9d5ff;
      --accent: #d946ef;
      --accent-glow: rgba(217, 70, 239, 0.35);
      --glass-bg: rgba(255, 255, 255, 0.045);
      --glass-border: rgba(168, 85, 247, 0.25);
      --glass-strong: rgba(255, 255, 255, 0.07);
      --text-primary: #f5f0ff;
      --text-secondary: rgba(196, 181, 253, 0.75);
      --text-muted: rgba(139, 92, 246, 0.55);
      --radius: 20px;
      --radius-sm: 12px;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      --font-display: 'Cinzel', serif;
      --font-body: 'DM Sans', sans-serif;
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-deep);
      color: var(--text-primary);
      overflow-x: hidden;
      position: relative;
    }

    /* animated orbs */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    .orb1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(124,58,237,0.18), transparent 70%);
      top: -100px; left: -100px;
      animation: drift1 14s ease-in-out infinite alternate;
    }
    .orb2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(217,70,239,0.12), transparent 70%);
      top: 30%; right: -80px;
      animation: drift2 18s ease-in-out infinite alternate;
    }
    .orb3 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(139,92,246,0.14), transparent 70%);
      bottom: 10%; left: 25%;
      animation: drift1 22s ease-in-out infinite alternate-reverse;
    }

    @keyframes drift1 {
      from { transform: translate(0,0); }
      to { transform: translate(30px, 40px); }
    }
    @keyframes drift2 {
      from { transform: translate(0,0); }
      to { transform: translate(-25px, 30px); }
    }

    /* navbar */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 68px;
      background: rgba(10, 0, 16, 0.75);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-symbol {
      color: var(--accent);
      font-size: 20px;
      animation: pulse-glow 3s ease-in-out infinite;
    }
    .logo-text {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 2px;
      background: linear-gradient(135deg, var(--purple-200), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    @keyframes pulse-glow {
      0%, 100% { text-shadow: 0 0 8px var(--accent-glow); }
      50% { text-shadow: 0 0 20px var(--accent-glow); }
    }
    .nav-links {
      display: flex;
      gap: 8px;
    }
    .nav-link {
      font-size: 13px;
      color: var(--text-secondary);
      padding: 6px 14px;
      border-radius: 40px;
      text-decoration: none;
      transition: all 0.2s;
    }
    .nav-link:hover {
      background: var(--glass-bg);
      color: var(--text-primary);
    }
    .user-pill {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--glass-bg);
      padding: 4px 12px 4px 8px;
      border-radius: 60px;
      border: 1px solid var(--glass-border);
    }
    .avatar {
      width: 36px;
      height: 36px;
      background: var(--purple-700);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 15px;
      color: var(--purple-200);
    }
    .user-name {
      font-size: 13px;
      font-weight: 500;
    }
    .user-label {
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    /* main container */
    .page-wrapper {
      position: relative;
      z-index: 2;
      max-width: 1200px;
      margin: 0 auto;
      padding: 36px 32px 80px;
    }

    /* glass card */
    .glass-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.05);
      padding: 28px 32px;
      margin-bottom: 24px;
      transition: transform 0.2s, border-color 0.2s;
    }

    .error-banner {
      background: rgba(239,68,68,0.12);
      border-left: 4px solid var(--error);
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      margin-bottom: 24px;
      font-size: 13px;
      color: #fca5a5;
    }

    /* candidate card (glass variant) */
    .candidate-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 24px;
    }
    .candidate-identity {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .candidate-avatar-lg {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--purple-500), var(--accent));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      box-shadow: 0 0 0 2px rgba(168,85,247,0.3);
    }
    .candidate-name {
      font-size: 26px;
      font-weight: 700;
      font-family: var(--font-display);
      letter-spacing: 1px;
    }
    .candidate-best-role {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 6px;
    }
    .candidate-best-role span {
      color: var(--purple-300);
      font-weight: 600;
    }
    .candidate-stats {
      display: flex;
      gap: 16px;
    }
    .c-stat {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 12px 18px;
      min-width: 85px;
      text-align: center;
    }
    .c-stat-value {
      font-size: 26px;
      font-weight: 700;
      line-height: 1;
    }
    .c-stat-label {
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    /* two column grid */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }
    .panel {
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 20px 24px;
    }
    .panel-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--purple-300);
      margin-bottom: 20px;
    }

    /* radar container */
    .radar-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    /* fit bars */
    .fit-bar-row {
      margin-bottom: 18px;
    }
    .fit-bar-top {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 13px;
    }
    .fit-bar-label {
      font-weight: 500;
    }
    .fit-bar-pct {
      font-weight: 600;
    }
    .fit-bar-track {
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 10px;
      overflow: hidden;
    }
    .fit-bar-fill {
      height: 100%;
      border-radius: 10px;
      transition: width 0.5s ease;
    }

    /* learn next section */
    .learn-card {
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 20px 24px;
    }
    .learn-items {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      margin-top: 8px;
    }
    .learn-item {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 16px;
      transition: 0.2s;
    }
    .learn-item:hover {
      background: rgba(255,255,255,0.06);
    }
    .learn-item-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }
    .learn-skill-name {
      font-weight: 700;
      font-size: 15px;
    }
    .learn-boost {
      font-size: 11px;
      background: rgba(16,185,129,0.15);
      padding: 4px 8px;
      border-radius: 40px;
      color: var(--success);
    }
    .learn-roles {
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }
    .learn-link {
      font-size: 12px;
      color: var(--purple-300);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: 0.2s;
    }
    .learn-link:hover {
      color: var(--accent);
      text-decoration: underline;
    }

    .loading {
      color: var(--text-muted);
      padding: 20px;
      text-align: center;
      font-size: 13px;
    }

    @media (max-width: 780px) {
      .navbar {
        padding: 0 20px;
      }
      .page-wrapper {
        padding: 24px 20px;
      }
      .two-col {
        grid-template-columns: 1fr;
        gap: 20px;
      }
      .candidate-card {
        flex-direction: column;
        align-items: flex-start;
      }
      .candidate-stats {
        width: 100%;
        justify-content: space-between;
      }
      .glass-card {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="bg-orb orb3"></div>

  <nav class="navbar">
    <div class="logo">
      <span class="logo-symbol">✦</span>
      <span class="logo-text">NeuroVision</span>
    </div>
    <div class="nav-links">
      <a class="nav-link" href="/dashboard.html">Home</a>
      <a class="nav-link" href="/skills.html">Profile</a>
      <a class="nav-link" href="/skillGap.html">Skill Gap</a>
    </div>
    <div class="user-pill">
      <div>
        <div class="user-name" id="nav-username">—</div>
        <div class="user-label">CANDIDATE</div>
      </div>
      <div class="avatar" id="nav-avatar">?</div>
    </div>
  </nav>

  <div class="page-wrapper">
    <div class="error-banner" id="error-banner" style="display: none;"></div>

    <!-- candidate glass card -->
    <div class="glass-card">
      <div class="candidate-card">
        <div class="candidate-identity">
          <div class="candidate-avatar-lg" id="card-avatar">?</div>
          <div>
            <div class="candidate-name" id="card-name">—</div>
            <div class="candidate-best-role">Best match: <span id="card-best-role">calculating…</span></div>
          </div>
        </div>
        <div class="candidate-stats">
          <div class="c-stat">
            <div class="c-stat-value" id="stat-roles">—</div>
            <div class="c-stat-label">Roles</div>
          </div>
          <div class="c-stat">
            <div class="c-stat-value" id="stat-skills">—</div>
            <div class="c-stat-label">Skills</div>
          </div>
          <div class="c-stat">
            <div class="c-stat-value" id="stat-best" style="color:var(--purple-300);">—</div>
            <div class="c-stat-label">Top fit</div>
          </div>
          <div class="c-stat">
            <div class="c-stat-value" id="stat-internship">—</div>
            <div class="c-stat-label">Intern mo</div>
          </div>
        </div>
      </div>
    </div>

    <!-- radar + role fit -->
    <div class="two-col">
      <div class="panel">
        <div class="panel-title">✨ Skill radar — your best role</div>
        <div class="radar-wrap" id="radar-wrap"><div class="loading">Calculating…</div></div>
      </div>
      <div class="panel">
        <div class="panel-title">📊 Role fit comparison</div>
        <div id="fit-bars"><div class="loading">Scoring roles…</div></div>
      </div>
    </div>

    <!-- learn next -->
    <div class="learn-card">
      <div class="panel-title">🎯 What to learn next — highest score impact</div>
      <div class="learn-items" id="learn-items">
        <div class="loading">Analysing gaps…</div>
      </div>
    </div>
  </div>

  <script>
    // ---------- session / constants ----------
    const SESSION_KEY = 'nv_user';
    const BASE = '';

    // roleData (exactly as you defined, matching new skills)
    const ROLE_DATA = {
      "Backend Developer": [
        { "name": "Node.js", "requiredLevel": 5, "weight": 30 },
        { "name": "Express", "requiredLevel": 4, "weight": 25 },
        { "name": "MongoDB", "requiredLevel": 4, "weight": 15 },
        { "name": "PostgreSQL", "requiredLevel": 4, "weight": 15 },
        { "name": "Redis", "requiredLevel": 3, "weight": 15 }
      ],
      "Frontend Developer": [
        { "name": "React", "requiredLevel": 5, "weight": 30 },
        { "name": "TypeScript", "requiredLevel": 4, "weight": 20 },
        { "name": "Next.js", "requiredLevel": 4, "weight": 20 },
        { "name": "Redux", "requiredLevel": 3, "weight": 15 },
        { "name": "Tailwind", "requiredLevel": 3, "weight": 15 }
      ],
      "Full Stack Developer": [
        { "name": "React", "requiredLevel": 4, "weight": 20 },
        { "name": "Node.js", "requiredLevel": 4, "weight": 20 },
        { "name": "MongoDB", "requiredLevel": 3, "weight": 20 },
        { "name": "Express", "requiredLevel": 3, "weight": 20 },
        { "name": "Next.js", "requiredLevel": 3, "weight": 20 }
      ],
      "Data Analyst": [
        { "name": "SQL", "requiredLevel": 4, "weight": 25 },
        { "name": "Python", "requiredLevel": 4, "weight": 25 },
        { "name": "Excel", "requiredLevel": 3, "weight": 20 },
        { "name": "PowerBI", "requiredLevel": 3, "weight": 15 },
        { "name": "Tableau", "requiredLevel": 3, "weight": 15 }
      ],
      "Machine Learning Engineer": [
        { "name": "Python", "requiredLevel": 5, "weight": 30 },
        { "name": "TensorFlow", "requiredLevel": 4, "weight": 20 },
        { "name": "PyTorch", "requiredLevel": 4, "weight": 20 },
        { "name": "Scikit-Learn", "requiredLevel": 4, "weight": 15 },
        { "name": "NumPy", "requiredLevel": 4, "weight": 15 }
      ]
    };
    const TUTORIAL_BASE = 'https://www.geeksforgeeks.org/search/?q=';

    let profileData = null;
    let roleResults = {};

    function getUserId() {
      try {
        const u = JSON.parse(sessionStorage.getItem(SESSION_KEY));
        return u?.id || null;
      } catch { return null; }
    }

    function scoreColor(v) {
      if (v >= 70) return '#10b981';
      if (v >= 40) return '#f59e0b';
      return '#ef4444';
    }

    function computeScoreImpact(roleName, skillName, userSkills) {
      const roleSkills = ROLE_DATA[roleName];
      if (!roleSkills) return 0;
      const totalWeight = roleSkills.reduce((s, r) => s + r.weight, 0);
      const rs = roleSkills.find(r => r.name === skillName);
      if (!rs) return 0;
      return (rs.weight / totalWeight) * 100;
    }

    function buildLearnNext() {
      if (!profileData) return;
      const skillMap = {};
      profileData.roles.forEach(roleObj => {
        const res = roleResults[roleObj.role] || {};
        const userSkillNames = roleObj.technicalSkills.map(s => s.skill.toLowerCase());
        const roleSkills = ROLE_DATA[roleObj.role] || [];
        roleSkills.forEach(rs => {
          if (!userSkillNames.includes(rs.name.toLowerCase())) {
            const impact = computeScoreImpact(roleObj.role, rs.name, roleObj.technicalSkills);
            if (!skillMap[rs.name]) {
              skillMap[rs.name] = { roles: [], maxImpact: 0, tutorial: TUTORIAL_BASE + encodeURIComponent(rs.name) };
            }
            skillMap[rs.name].roles.push(roleObj.role);
            skillMap[rs.name].maxImpact = Math.max(skillMap[rs.name].maxImpact, impact);
          }
        });
        if (res.missingSkillsWithTutorials) {
          res.missingSkillsWithTutorials.forEach(s => {
            if (skillMap[s.skill]) skillMap[s.skill].tutorial = s.tutorial;
          });
        }
      });

      const sorted = Object.entries(skillMap).sort((a,b) => b[1].maxImpact - a[1].maxImpact).slice(0,6);
      const el = document.getElementById('learn-items');
      if (!sorted.length) {
        el.innerHTML = '<div style="font-size:13px;color:var(--text-muted);padding:16px;">✨ No missing skills — you have full coverage!</div>';
        return;
      }
      el.innerHTML = sorted.map(([skill, data]) => `
        <div class="learn-item">
          <div class="learn-item-top">
            <div class="learn-skill-name">${skill}</div>
            <div class="learn-boost">+${Math.round(data.maxImpact)}%</div>
          </div>
          <div class="learn-roles">Needed for: ${data.roles.join(', ')}</div>
          <a class="learn-link" href="${data.tutorial}" target="_blank">📘 Learn ${skill} ↗</a>
        </div>
      `).join('');
    }

    function renderFitBars() {
      const el = document.getElementById('fit-bars');
      const entries = profileData.roles.map(r => ({
        role: r.role,
        score: roleResults[r.role]?.finalScore ?? null
      })).filter(e => e.score !== null).sort((a,b) => b.score - a.score);
      if (!entries.length) { el.innerHTML = '<div class="loading">No scores yet</div>'; return; }
      el.innerHTML = entries.map(e => `
        <div class="fit-bar-row">
          <div class="fit-bar-top">
            <span class="fit-bar-label">${e.role}</span>
            <span class="fit-bar-pct" style="color:${scoreColor(e.score)}">${Math.round(e.score)}%</span>
          </div>
          <div class="fit-bar-track">
            <div class="fit-bar-fill" style="width:${Math.round(e.score)}%;background:${scoreColor(e.score)}"></div>
          </div>
        </div>
      `).join('');
    }

    function renderRadar() {
      const el = document.getElementById('radar-wrap');
      const best = profileData.roles
        .filter(r => roleResults[r.role]?.finalScore != null)
        .sort((a,b) => roleResults[b.role].finalScore - roleResults[a.role].finalScore)[0];
      if (!best) { el.innerHTML = '<div class="loading">Calculating…</div>'; return; }

      const roleSkills = ROLE_DATA[best.role] || [];
      if (!roleSkills.length) return;

      const size = 240;
      const cx = size/2, cy = size/2;
      const maxR = 90;
      const n = roleSkills.length;
      const angleStep = (2 * Math.PI) / n;
      const getPoint = (i, r) => ({
        x: cx + r * Math.sin(i * angleStep),
        y: cy - r * Math.cos(i * angleStep)
      });

      let rings = '';
      [0.25, 0.5, 0.75, 1].forEach(t => {
        const pts = Array.from({ length: n }, (_, i) => getPoint(i, maxR * t));
        rings += `<polygon points="${pts.map(p=>`${p.x},${p.y}`).join(' ')}" fill="none" stroke="rgba(168,85,247,0.18)" stroke-width="0.6"/>`;
      });
      let axes = '';
      roleSkills.forEach((_,i) => {
        const p = getPoint(i, maxR);
        axes += `<line x1="${cx}" y1="${cy}" x2="${p.x}" y2="${p.y}" stroke="rgba(168,85,247,0.2)" stroke-width="0.6"/>`;
      });

      const userSkillMap = {};
      best.technicalSkills.forEach(s => { userSkillMap[s.skill.toLowerCase()] = s.level; });
      const dataPoints = roleSkills.map((rs, i) => {
        const userLevel = userSkillMap[rs.name.toLowerCase()] ?? 0;
        const ratio = Math.min(userLevel / 10, 1);
        return getPoint(i, maxR * ratio);
      });
      const polyPoints = dataPoints.map(p=>`${p.x},${p.y}`).join(' ');

      let labels = '';
      roleSkills.forEach((rs, i) => {
        const p = getPoint(i, maxR + 18);
        const userLevel = userSkillMap[rs.name.toLowerCase()];
        const color = userLevel != null ? '#c084fc' : 'rgba(196,181,253,0.3)';
        labels += `<text x="${p.x}" y="${p.y}" text-anchor="middle" dominant-baseline="middle" font-size="9.5" fill="${color}" font-family="DM Sans">${rs.name}</text>`;
      });

      let dots = '';
      dataPoints.forEach(p => { dots += `<circle cx="${p.x}" cy="${p.y}" r="3" fill="#d946ef" />`; });

      el.innerHTML = `
        <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
          ${rings}${axes}
          <polygon points="${polyPoints}" fill="rgba(168,85,247,0.2)" stroke="#a855f7" stroke-width="1.5"/>
          ${dots}${labels}
        </svg>
        <div style="font-size:11px; color:var(--text-secondary); margin-top:12px;">${best.role} · radar view</div>
      `;
    }

    function updateCard() {
      const scores = Object.entries(roleResults).filter(([,r]) => r.finalScore != null).sort((a,b)=>b[1].finalScore - a[1].finalScore);
      if (scores.length) {
        const [bestRole, bestRes] = scores[0];
        document.getElementById('card-best-role').textContent = bestRole;
        document.getElementById('stat-best').textContent = Math.round(bestRes.finalScore) + '%';
        document.getElementById('stat-best').style.color = scoreColor(bestRes.finalScore);
      }
    }

    // API calls
    async function fetchScore(userId, role) {
      const res = await fetch(`${BASE}/api/score/${userId}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ role })
      });
      if (!res.ok) throw new Error();
      return res.json();
    }
    async function fetchSkillGap(roleObj) {
      const res = await fetch(`${BASE}/api/skill-gap`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          targetRole: roleObj.role,
          cgpa: roleObj.cgpa,
          technicalSkills: roleObj.technicalSkills.map(s => s.skill),
          tools: []
        })
      });
      if (!res.ok) throw new Error();
      return res.json();
    }

    async function loadRoleData(userId, roleObj) {
      try {
        const [scoreRes, gapRes] = await Promise.all([fetchScore(userId, roleObj.role), fetchSkillGap(roleObj)]);
        roleResults[roleObj.role] = {
          finalScore: scoreRes.finalScore,
          compatibilityScore: gapRes.compatibilityScore,
          matchedSkills: gapRes.matchedSkills,
          missingSkillsWithTutorials: gapRes.missingSkillsWithTutorials,
          recommendation: gapRes.recommendation,
          cgpaStatus: gapRes.cgpaStatus
        };
      } catch {
        roleResults[roleObj.role] = roleResults[roleObj.role] || {};
      }
      updateCard();
      renderFitBars();
      renderRadar();
      buildLearnNext();
    }

    async function init() {
      const userId = getUserId();
      const errorBanner = document.getElementById('error-banner');

      if (!userId) {
        errorBanner.style.display = 'block';
        errorBanner.textContent = '⚠️ Not logged in — showing demo data.';
        profileData = {
          id: 'demo',
          username: 'Harshit',
          roles: [
            { role: 'Backend Developer', cgpa: 5, internshipMonths: 0,
              technicalSkills: [{ skill: 'Node.js', level: 4 }, { skill: 'Express', level: 3 }, { skill: 'MongoDB', level: 5 }] },
            { role: 'Frontend Developer', cgpa: 8, internshipMonths: 2,
              technicalSkills: [{ skill: 'React', level: 7 }, { skill: 'TypeScript', level: 6 }, { skill: 'Tailwind', level: 5 }] },
          ]
        };
      } else {
        try {
          const res = await fetch(`${BASE}/api/profile/${userId}`);
          if (!res.ok) throw new Error();
          profileData = await res.json();
        } catch {
          errorBanner.style.display = 'block';
          errorBanner.textContent = 'Could not load profile. Make sure API is running.';
          return;
        }
      }

      const name = profileData.username || 'User';
      const initial = name.charAt(0).toUpperCase();
      document.getElementById('nav-username').textContent = name;
      document.getElementById('nav-avatar').textContent = initial;
      document.getElementById('card-avatar').textContent = initial;
      document.getElementById('card-name').textContent = name;

      const totalSkills = profileData.roles.reduce((s, r) => s + r.technicalSkills.length, 0);
      const totalInternship = profileData.roles.reduce((s, r) => s + (r.internshipMonths || 0), 0);
      document.getElementById('stat-roles').textContent = profileData.roles.length;
      document.getElementById('stat-skills').textContent = totalSkills;
      document.getElementById('stat-internship').textContent = totalInternship;

      profileData.roles.forEach(r => loadRoleData(profileData.id, r));
    }

    init();
  </script>
</body>
</html>
