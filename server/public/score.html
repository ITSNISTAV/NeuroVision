<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeuroVision – Score</title>
 <link rel="stylesheet" href="score.css">
</head>
<body>

  <!-- NAV -->
  <nav>
    <span class="logo">✦ NeuroVision</span>
    <div class="user-info">
      <div>
        <div class="name">Harshit</div>
        <div class="role-label">CANDIDATE</div>
      </div>
      <div class="avatar">H</div>
    </div>
  </nav>

  <!-- PROFILE PICKER -->
  <div class="card">
    <div class="card-header">
      <div>
        <h2>Score a Profile</h2>
        <p>Select a saved profile to calculate your role fit</p>
      </div>
      <span class="badge-count" id="profile-count">0 profiles</span>
    </div>
    <div class="profile-grid" id="profile-grid"></div>
  </div>

  <!-- RESULT -->
  <div class="card" id="result-card">
    <div class="warning-banner" id="api-warning" style="display:none"></div>
    <div class="result-inner">
      <div class="score-col">
        <svg id="score-circle" width="140" height="140" viewBox="0 0 140 140">
          <circle cx="70" cy="70" r="54" fill="none" stroke="#2d1f4e" stroke-width="10"/>
          <circle id="score-arc" cx="70" cy="70" r="54" fill="none"
            stroke="#a855f7" stroke-width="10"
            stroke-dasharray="0 339.3"
            stroke-linecap="round"
            transform="rotate(-90 70 70)"
            style="transition: stroke-dasharray 0.8s ease, stroke 0.4s ease"/>
          <text id="score-text" x="70" y="65" text-anchor="middle"
            fill="white" font-size="22" font-weight="bold">0%</text>
          <text x="70" y="85" text-anchor="middle" fill="#a78bfa" font-size="11">FIT SCORE</text>
        </svg>
        <div class="fit-label" id="fit-label">–</div>
        <div class="role-name" id="result-role-name"></div>
      </div>

      <div class="breakdown-col">
        <div class="breakdown-header">
          <h3>Skill Breakdown</h3>
          <span class="legend"><span class="legend-mark">│</span> = required level</span>
        </div>
        <div id="skill-bars"></div>
      </div>
    </div>
  </div>

 <script src="score.js"></script>
</body>
</html>
